site_name: handoff
site_description: Transfer knowledge between AI agent sessions — local SQLite, no cloud, no config.
site_url: https://dborasik.github.io/handoff/
repo_name: Dborasik/handoff
repo_url: https://github.com/Dborasik/handoff
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

nav:
  - Home: index.md
  - Install: install.md
  - Commands: commands.md
  - Agent Setup: agents.md
  - Workflow: workflow.md
  - How It Works: internals.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.inlinehilite
  - tables
  - attr_list
  - def_list
  - footnotes
  - md_in_html

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Dborasik/handoff
